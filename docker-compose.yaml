services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - cargo-registry:/root/.cargo/registry
      - cargo-target:/app/target
      # Built binary lands here — directly on your host
      - ./dist:/app/dist
    command: bash
    stdin_open: true
    tty: true
    working_dir: /app

  test-lock:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - cargo-registry:/root/.cargo/registry
      - cargo-target:/app/target
    environment:
      - DISPLAY=:99
      - I3MORE_LOCK_PAM_SERVICE=i3more-lock-test
    command: bash /app/tests/docker-lock-test.sh
    working_dir: /app

volumes:
  cargo-registry:
  cargo-target:
