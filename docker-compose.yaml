services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - cargo-registry:/root/.cargo/registry
      - cargo-target:/app/target
      # Built binary lands here — directly on your host
      - ./dist:/app/dist
    command: bash
    stdin_open: true
    tty: true
    working_dir: /app

  test-lock:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - cargo-registry:/root/.cargo/registry
      - cargo-target:/app/target
    environment:
      - DISPLAY=:99
      - I3MORE_LOCK_PAM_SERVICE=i3more-lock-test
    command: bash /app/tests/docker-lock-test.sh
    working_dir: /app

  whisper-build:
    build:
      context: .
      dockerfile: Dockerfile.whisper-cuda
    volumes:
      - .:/src
      - cargo-registry:/root/.cargo/registry
      - whisper-target:/src/target
    working_dir: /src
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [compute, utility]

  # Builds the forked i3 at vendor/i3 (see docs/plan/dynamicWM.md).
  # Separate image so the i3 build chain (libev, libyajl, libxcb-*) doesn't
  # bloat the `dev` image used by the main Rust build.
  i3-build:
    build:
      context: .
      dockerfile: Dockerfile.i3
    volumes:
      - .:/src
    working_dir: /src
    command: bash

volumes:
  cargo-registry:
  cargo-target:
  whisper-target:
